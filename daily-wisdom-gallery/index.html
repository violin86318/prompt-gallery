<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日箴言 · 一字美学</title>
<style>
/* === 一字美学 · 水墨呼吸感 === */
:root {
  --bg: #faf8f5;
  --bg-card: #ffffff;
  --bg-dark: #0c0e12;
  --border: #e8e3dc;
  --text: #4a4540;
  --text-muted: #9a938b;
  --text-meta: #b8b0a5;
  --ink: #2c2824;
  --ink-light: #6b6560;
  --accent: #8b7355;
  --accent-light: #c4a87a;
  --seal: #b05040;
  --seal-light: #e8c8c0;
  --serif: "Noto Serif SC", "Songti SC", "STSong", serif;
  --sans: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", sans-serif;
  --mono: "JetBrains Mono", "SF Mono", "Menlo", monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* Paper texture */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* --- Header --- */
.header {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 80px 20px 40px;
}

.header__title {
  font-family: var(--serif);
  font-size: 2.4rem;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 0.15em;
  margin-bottom: 16px;
}

.header__sub {
  font-size: 0.9rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  line-height: 1.8;
}

.header__sub span {
  display: inline-block;
  margin: 0 4px;
  color: var(--accent);
}

.header__line {
  width: 60px;
  height: 1px;
  background: var(--accent-light);
  margin: 30px auto 0;
}

/* --- Stats --- */
.stats {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
  margin-bottom: 20px;
}

.stat {
  text-align: center;
}

.stat__num {
  font-family: var(--serif);
  font-size: 2rem;
  color: var(--ink);
  font-weight: 400;
}

.stat__label {
  font-size: 0.75rem;
  color: var(--text-meta);
  letter-spacing: 0.1em;
  margin-top: 4px;
}

/* --- Today Feature --- */
.today {
  position: relative;
  z-index: 1;
  max-width: 560px;
  margin: 0 auto 50px;
  padding: 0 20px;
}

.today__card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.today__card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.08);
}

.today__badge {
  display: inline-block;
  background: var(--seal);
  color: #fff;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  padding: 4px 14px;
  margin: 16px 16px 0;
  border-radius: 2px;
}

.today__img-wrap {
  position: relative;
  overflow: hidden;
}

.today__img {
  width: 100%;
  display: block;
  aspect-ratio: 1;
  object-fit: cover;
}

.today__char-overlay {
  position: absolute;
  bottom: 20px;
  right: 20px;
  font-family: var(--serif);
  font-size: 5rem;
  color: rgba(255,255,255,0.15);
  line-height: 1;
  pointer-events: none;
}

.today__body {
  padding: 20px 24px 24px;
}

.today__date {
  font-size: 0.75rem;
  color: var(--text-meta);
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

.today__quote {
  font-family: var(--serif);
  font-size: 1.1rem;
  color: var(--ink);
  line-height: 1.8;
  margin-bottom: 16px;
}

.today__captions {
  border-top: 1px solid var(--border);
  padding-top: 16px;
}

.today__caption-item {
  margin-bottom: 12px;
}

.today__caption-label {
  font-size: 0.7rem;
  color: var(--text-meta);
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

.today__caption-text {
  font-size: 0.88rem;
  color: var(--ink-light);
  line-height: 1.7;
}

/* --- Gallery Grid --- */
.gallery {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

.gallery__title {
  font-family: var(--serif);
  font-size: 1.1rem;
  color: var(--ink);
  letter-spacing: 0.1em;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.gallery__grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

/* --- Card --- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  cursor: pointer;
  position: relative;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.08);
}

.card__img-wrap {
  position: relative;
  overflow: hidden;
}

.card__img {
  width: 100%;
  display: block;
  aspect-ratio: 1;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.card:hover .card__img {
  transform: scale(1.03);
}

.card__char {
  position: absolute;
  top: 16px;
  left: 16px;
  width: 48px;
  height: 48px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(8px);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-size: 1.6rem;
  color: var(--ink);
}

.card__body {
  padding: 16px 18px 18px;
}

.card__date {
  font-size: 0.72rem;
  color: var(--text-meta);
  letter-spacing: 0.06em;
  font-family: var(--mono);
}

.card__quote {
  font-family: var(--serif);
  font-size: 0.88rem;
  color: var(--ink-light);
  line-height: 1.6;
  margin-top: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card__seal {
  position: absolute;
  bottom: 14px;
  right: 14px;
  width: 24px;
  height: 24px;
  border: 1.5px solid var(--seal);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-size: 0.65rem;
  color: var(--seal);
  opacity: 0.6;
}

/* --- Modal --- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 100;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 20px;
  overflow-y: auto;
}

.modal-overlay.active {
  display: flex;
}

.modal {
  background: var(--bg-card);
  border-radius: 3px;
  max-width: 600px;
  width: 100%;
  overflow: hidden;
  animation: modalIn 0.3s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal__close {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.8);
  border: none;
  border-radius: 50%;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  z-index: 2;
}

.modal__img {
  width: 100%;
  display: block;
}

.modal__body {
  padding: 28px 32px 32px;
}

.modal__header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 20px;
}

.modal__char-big {
  font-family: var(--serif);
  font-size: 3rem;
  color: var(--ink);
  line-height: 1;
}

.modal__date-big {
  font-size: 0.8rem;
  color: var(--text-meta);
  font-family: var(--mono);
}

.modal__captions {
  margin-top: 20px;
}

.modal__caption-block {
  padding: 16px 0;
  border-top: 1px solid var(--border);
}

.modal__caption-label {
  font-size: 0.72rem;
  color: var(--accent);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}

.modal__caption-text {
  font-family: var(--serif);
  font-size: 0.95rem;
  color: var(--ink-light);
  line-height: 1.8;
  white-space: pre-line;
}

/* --- Footer --- */
.footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 40px 20px;
  font-size: 0.75rem;
  color: var(--text-meta);
  letter-spacing: 0.08em;
}

.footer a {
  color: var(--accent);
  text-decoration: none;
}

/* --- Responsive --- */
@media (max-width: 640px) {
  .header { padding: 50px 16px 30px; }
  .header__title { font-size: 1.8rem; }
  .stats { gap: 24px; }
  .gallery__grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .card__char { width: 36px; height: 36px; font-size: 1.2rem; }
  .modal__body { padding: 20px; }
  .modal__char-big { font-size: 2.4rem; }
}

@media (max-width: 400px) {
  .gallery__grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header__title">每日箴言 · 一字美学</div>
  <div class="header__sub">
    一字一画，<span>一日一箴言</span>，东方留白里的日常修行
  </div>
  <div class="header__line"></div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat">
    <div class="stat__num" id="totalCount">-</div>
    <div class="stat__label">箴言</div>
  </div>
  <div class="stat">
    <div class="stat__num" id="dayCount">-</div>
    <div class="stat__label">天</div>
  </div>
  <div class="stat">
    <div class="stat__num" id="todayChar">-</div>
    <div class="stat__label">今日字</div>
  </div>
</div>

<!-- Today Feature -->
<div class="today" id="todaySection"></div>

<!-- Gallery -->
<div class="gallery">
  <div class="gallery__title">往期箴言</div>
  <div class="gallery__grid" id="galleryGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Footer -->
<div class="footer">
  每日箴言 · GPT Image 2 生成 · <a href="https://x.com/xiaoxiaodong01" target="_blank">小小东 #47</a> 启发 · 2026
</div>

<script>
let wisdoms = [];

async function loadData() {
  try {
    // 尝试从 API 加载
    const res = await fetch('/api/wisdoms');
    if (res.ok) {
      wisdoms = await res.json();
      return;
    }
  } catch(e) {}

  try {
    // 备用：直接加载 JSON 文件
    const res = await fetch('./wisdom_gallery.json');
    if (res.ok) {
      wisdoms = await res.json();
      return;
    }
  } catch(e) {}

  // 内嵌数据兜底
  wisdoms = [];
}

function renderStats() {
  document.getElementById('totalCount').textContent = wisdoms.length;
  document.getElementById('dayCount').textContent = wisdoms.length;
  document.getElementById('todayChar').textContent = wisdoms.length > 0
    ? wisdoms[wisdoms.length - 1].char : '—';
}

function getImageUrl(item) {
  return './' + item.image;
}

function renderToday() {
  const section = document.getElementById('todaySection');
  if (wisdoms.length === 0) {
    section.innerHTML = '<p style="text-align:center;color:var(--text-muted)">暂无箴言</p>';
    return;
  }

  const today = wisdoms[wisdoms.length - 1];
  const captions = today.captions || {};

  section.innerHTML = `
    <div class="today__card" onclick="openModal(${wisdoms.length - 1})">
      <div class="today__badge">TODAY</div>
      <div class="today__img-wrap">
        <img class="today__img" src="${getImageUrl(today)}" alt="今日字：${today.char}">
        <div class="today__char-overlay">${today.char}</div>
      </div>
      <div class="today__body">
        <div class="today__date">${today.date}</div>
        <div class="today__quote">${captions.v3_quote || '—'}</div>
        <div class="today__captions">
          <div class="today__caption-item">
            <div class="today__caption-label">生活分享</div>
            <div class="today__caption-text">${(captions.v1_life || '').replace(/\n/g, '<br>')}</div>
          </div>
          <div class="today__caption-item">
            <div class="today__caption-label">观点输出</div>
            <div class="today__caption-text">${(captions.v2_opinion || '').replace(/\n/g, '<br>')}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  // 倒序，最新在前（today 除外）
  const items = wisdoms.slice(0, -1).reverse();

  grid.innerHTML = items.map((item, i) => {
    const idx = wisdoms.length - 2 - i;
    return `
      <div class="card" onclick="openModal(${idx})">
        <div class="card__img-wrap">
          <img class="card__img" src="${getImageUrl(item)}" alt="字：${item.char}" loading="lazy">
          <div class="card__char">${item.char}</div>
        </div>
        <div class="card__body">
          <div class="card__date">${item.date}</div>
          <div class="card__quote">${(item.captions || {}).v3_quote || ''}</div>
        </div>
        <div class="card__seal">${item.char}</div>
      </div>
    `;
  }).join('');
}

function openModal(idx) {
  const item = wisdoms[idx];
  if (!item) return;

  const captions = item.captions || {};
  const modal = document.getElementById('modal');
  const content = document.getElementById('modalContent');

  content.innerHTML = `
    <button class="modal__close" onclick="closeModal()">×</button>
    <img class="modal__img" src="${getImageUrl(item)}" alt="字：${item.char}">
    <div class="modal__body">
      <div class="modal__header">
        <div class="modal__char-big">${item.char}</div>
        <div class="modal__date-big">${item.date}</div>
      </div>
      <div class="modal__captions">
        <div class="modal__caption-block">
          <div class="modal__caption-label">✦ 生活分享</div>
          <div class="modal__caption-text">${captions.v1_life || ''}</div>
        </div>
        <div class="modal__caption-block">
          <div class="modal__caption-label">✦ 观点输出</div>
          <div class="modal__caption-text">${captions.v2_opinion || ''}</div>
        </div>
        <div class="modal__caption-block">
          <div class="modal__caption-label">✦ 金句</div>
          <div class="modal__caption-text">${captions.v3_quote || ''}</div>
        </div>
      </div>
    </div>
  `;

  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// Init
loadData().then(() => {
  renderStats();
  renderToday();
  renderGallery();
});
</script>
</body>
</html>
